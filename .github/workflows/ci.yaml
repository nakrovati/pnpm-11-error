name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6

      - name: pnpm version
        run: pnpm --version

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: pnpm install
        run: pnpm ci

      - name: pnpm version
        run: pnpm --version
